<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задание</title>
</head>
<body style="background:#0b1a2a;color:white;text-align:center;font-family:sans-serif">

<h1>Выполни задание</h1>

<button onclick="start()">Начать</button>

<p id="question"></p>

<input id="answer">
<button onclick="checkAnswer()">Подтвердить</button>

<script>
const API_URL = "https://earnball.onrender.com";
const SECRET = "Ap41daLd";

const urlParams = new URLSearchParams(window.location.search);
const click_id = urlParams.get("click_id");

let a = 0;
let b = 0;

function start() {
    a = Math.floor(Math.random() * 10);
    b = Math.floor(Math.random() * 10);

    document.getElementById("question").innerText = `Сколько будет ${a} + ${b}?`;
}

async function checkAnswer() {
    const userAnswer = document.getElementById("answer").value;

    if (!click_id) {
        alert("Ошибка: нет click_id");
        return;
    }

    if (parseInt(userAnswer) !== a + b) {
        alert("Неверно ❌");
        return;
    }

    try {
        // отмечаем посещение
        await fetch(API_URL + "/visit", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                click_id: click_id,
                secret: SECRET
            })
        });

        alert("Задание выполнено ✅");

        // возвращаем в бота
        window.location.href = "https://t.me/teen_money_star_bot?start=" + click_id;

    } catch (e) {
        alert("Ошибка соединения ❌");
    }
}
</script>

</body>
</html>
