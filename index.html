<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Задание</title>
</head>

<body style="background:#0b1a2a;color:white;text-align:center;margin-top:100px;">

<h1>Выполни задание</h1>

<button onclick="start()">Начать</button>

<div id="task" style="display:none;margin-top:20px;">
    <p>Сколько будет 2 + 6?</p>
    <input id="answer" type="text">
    <button onclick="check()">Подтвердить</button>
</div>

<script>
const API = "https://earnball.onrender.com"
const BOT = "https://t.me/teen_money_star_bot"

const params = new URLSearchParams(window.location.search)
const click_id = params.get("click_id")

function start(){
    document.getElementById("task").style.display = "block"
}

async function check(){
    const ans = document.getElementById("answer").value

    if(ans != "8"){
        alert("Неправильно")
        return
    }

    try {
        // ✅ отправка на сервер
        await fetch(API + "/visit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                click_id: click_id,
                secret: "Ap41daLd"
            })
        })

        // ⏳ даём серверу время
        setTimeout(() => {
            window.location.href = BOT + "?start=" + click_id
        }, 1000)

    } catch(e) {
        alert("Ошибка соединения")
    }
}
</script>

</body>
</html>
