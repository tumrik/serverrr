<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Задание</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h1>Выполни задание</h1>

<button onclick="startTask()">Начать</button>

<div id="captchaBox" style="display:none;margin-top:20px;">
    <p id="captchaQuestion"></p>
    <input id="captchaAnswer" placeholder="Ответ">
    <button onclick="checkCaptcha()">Подтвердить</button>
</div>

<script>
const API = "https://earnball.onrender.com";
const SECRET = "Ap41daLd";

let correct = 0;
let click_id = null;

function startTask() {
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);

    correct = a + b;
    click_id = Date.now().toString();

    document.getElementById("captchaQuestion").innerText =
        `Сколько будет ${a} + ${b}?`;

    document.getElementById("captchaBox").style.display = "block";
}

function checkCaptcha() {
    let ans = document.getElementById("captchaAnswer").value;

    if (parseInt(ans) !== correct) {
        alert("Ошибка");
        return;
    }

    let delay = 5000 + Math.random()*10000;

    setTimeout(() => {

        fetch(API + "/visit", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                click_id: click_id,
                secret: SECRET
            })
        });

        // переход в бота
        window.location.href =
            `https://t.me/teen_money_star_bot?start=${click_id}`;

    }, delay);
}
</script>

</body>
</html>
